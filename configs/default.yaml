# ============================================================================
# QLoRA + Selective Salient QAT — Experiment Configuration
# ============================================================================

# --- Model ---
model:
  name: "meta-llama/Llama-2-7b-hf"
  quant_bits: 4                    # 3 or 4 (NF3 or NF4)
  double_quant: true               # QLoRA double quantization
  quant_type: "nf4"                # "nf4" or "fp4"; for 3-bit use "nf3" (custom)
  dtype: "bfloat16"          # compute dtype
  max_seq_len: 2048
  attn_implementation: "sdpa"   # "eager", "sdpa", "flash_attention_2"

# --- LoRA ---
lora:
  rank: 64
  alpha: 16
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# --- QAT Mode ---
# "none"  = standard QLoRA (no QAT)
# "full"  = full QAT on all quantized weights
# "sqat"  = selective salient QAT (ours)
# "qalora" = QA-LoRA group-wise LoRA with asymmetric quantized merged weights
qat:
  mode: "sqat"
  symmetric: false                   # true = symmetric; false = affine asymmetric with zero_point
  group_size: 64                   # quantization group size (shared by all modes & export)
  # SQAT-specific
  sqat:
    top_k_ratio: 0.01              # fraction of salient input channels
    base_max_refresh_interval: 0  # steps between max group updates (base, non-salient)
    salient_gain_alpha: 0.5        # the strength of the salient amplification
    salient_gain_max: 2.0          # maximum value for AWQ-style saliency amplification D
    initial_aligned_tol: 1.0e-6    # tolerance for initial salient aligned statistics
    calibration_samples: 1024       # num samples for 2nd moment estimation
    calibration_seq_len: 1024       # seq len for calibration
    plot_activation_stats: true    # whether to plot activation distributions for debugging
  # Full QAT-specific
  full_qat:
    pass_through_scale_grad: false
  # QA-LoRA-specific (QA-LoRA supports asymmetric affine quantization only)
  qalora:
    pool: "mean"                    # group-wise mean pooling over input channels
    quantize_merged_weight: true     # fake-quant W_base + expanded QA-LoRA delta

# --- Data ---
data:
  # Fine-tuning dataset
  train_dataset: "metamath"  # or "metamath", "openassistant", custom path
  train_split: "train"
  val_split: "validation"
  max_train_samples: null         # null = use all
  prompt_template: "metamath"  # template name (see data.py)
  
# --- Training ---
training:
  output_dir: "outputs/qlora"
  num_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2   # effective batch = 4 GPUs × 8 × 2 = 64
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_grad_norm: 0.3
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 2
  dataloader_num_workers: 4
  group_by_length: true
  report_to: "wandb"              # "wandb", "tensorboard", "none"
  seed: 42

# --- Evaluation ---
eval:
  # MMLU
  mmlu:
    num_fewshot: 0
    batch_size: 8
  # Extended benchmarks (BoolQ, HellaSwag, WinoGrande, ARC-e, ARC-c, PIQA, SIQA, OBQA)
  benchmarks:
    - "boolq"
    - "hellaswag"
    - "winogrande"
    - "arc_easy"
    - "arc_challenge"
    - "piqa"
    # - "social_iqa"
    - "openbookqa"
  benchmark_batch_size: 16

# --- Export ---
export:
  merge_and_save: true
  output_dtype: "float16"          # merged weight dtype
  push_to_hub: false
  hub_model_id: null
