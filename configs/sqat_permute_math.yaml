model:
  name: "meta-llama/Llama-2-7b-hf"
  quant_bits: 3
  double_quant: true
  quant_type: "nf4"
  dtype: "bfloat16"
  max_seq_len: 2048

lora:
  rank: 64
  alpha: 16
  dropout: 0.0
  # All 7 projections participate in LoRA fine-tuning.
  # QAT fakequant coverage differs by projection type:
  #   q/k/v/gate/up_proj : residual-stream P_k permute → QAT on salient cols [0:layer_group_k]
  #   down_proj          : block-internal P4_l permute (salient-first) → QAT on [0:layer_group_k]
  #                        (arbitrary intermediate-dim permutation, no multi-head constraint)
  #   o_proj             : per-head Hadamard fold (H into v_proj + H^T into o_proj), NO QAT
  #                        (within-head permutation can't produce contiguous salient slice)
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

qat:
  mode: "sqat_permute"
  symmetric: false          # asymmetric affine (same as QA-LoRA convention)
  group_size: 64          # every auto-selected group_k is max(1, ceil(outliers/group_size))*group_size,
                            # so salient cols occupy complete quantization groups at [0:group_k].

  # LSQ / LSQ+ learnable quantization scale (LR-QAT style). When enabled, the per-step min-max
  # fakequant scale is replaced by a learnable nn.Parameter (asym → learn scale+zp, sym → learn
  # scale only), initialized current_minmax so the initial grid matches the old min-max grid.
  # Applies to full QAT and the sqat_permute salient slice. enabled=false → bit-identical to the
  # original min-max path. scales_lr is a dedicated (small) optimizer lr for the scale/zp group.
  lsq:
    enabled: true
    scales_lr: 1.0e-5

  # Calibration params — read by load_calibration_data (uses cfg["qat"]["sqat"])
  sqat:
    calibration_samples: 256
    calibration_seq_len: 2048

  sqat_permute:
    # Residual segment partition + per-segment group_k are selected automatically from calibration E[x²].
    # Rule:
    #   1. Detect true per-source residual outliers by log(E[x²]) > mean + sigma * std.
    #   2. Search contiguous segmentations with num_segments <= max_segments.
    #   3. Round each segment's group_k up to a positive multiple of qat.group_size.
    #   4. Pick the segmentation with 100% true-outlier capture and minimum
    #      sum(segment_num_layers * group_k).
    #
    # The resulting metadata records:
    #   boundary_sizes, segment_group_ks, layer_group_ks, segment_perms,
    #   down_layer_group_ks
    # q/k/v/gate/up use residual layer_group_ks; down_proj uses its own per-layer
    # down_layer_group_ks from each layer's down_proj E[x²] distribution.
    max_segments: 4

    # Log-space z-score threshold for residual q/k/v/gate/up segment outlier detection.
    outlier_log_sigma: 2.5
    # Separate log-space z-score threshold for per-layer down_proj group_k selection.
    down_outlier_log_sigma: 3

    # Stage: 1 = permutation-only (verify equivalence, no QAT), 2 = full QAT.
    stage: 2

    # gptq (Improvement 1): at export, quantize the NON-salient columns [layer_group_k:] with
    # GPTQ/OBS instead of plain RTN. The salient slice [0:layer_group_k] keeps the EXACT canonical
    # (training-consistent) grid; the non-salient block is GPTQ'd INDEPENDENTLY (no salient-error
    # leakage — the QAT/LoRA was trained to tolerate the salient quant error, so the non-salient
    # cols must approximate their fp16 weights, not compensate for the salient slice). Uses the
    # SAME group_size and asym/sym as QAT. Dense (--export_dequant) only; o_proj has no salient
    # slice → fully GPTQ. Composes with awq_scale. Calibrated on the training data in the permuted
    # basis (boundary gathers active), sequential per decoder layer (memory-bounded).
    gptq:
      enabled: true
      nsamples: 128          # calibration sequences for the Hessian
      percdamp: 0.01         # Hessian diagonal damping (fraction of mean diag)
      # blocksize is GPTQ's lazy-batch COMPUTE block (how many columns are error-compensated
      # before one batched Hessian update). It is NOT the quantization group: the quant grid is
      # group_size (=64 above). blocksize only must be a multiple of group_size (auto-aligned in
      # code). 128 is the standard GPTQ default (= 2 groups of 64); larger=faster, smaller=exacter.
      blocksize: 128
      batch_size: 2          # calibration micro-batch (keeps activation memory low)

    # awq_scale (Improvement 2): AWQ-style per-input-channel scaling of the per-layer salient slice
    # [0:layer_group_k]. Within each block, q/k/v share one scale S1 (they read the same input), gate/up
    # share S2, down_proj uses its own S3 (on its P4 intermediate slice); o_proj is untouched (it
    # keeps its per-head Hadamard, NO QAT). S_j = (E[x²]_j)^alpha normalized so min=1, clamped to
    # [1, max]. Training fakequants in the amplified space W*S; export bakes 1/S into the dense
    # weight (deployed = quant(W*S)/S), so it is purely a better quant grid — bit-identical output,
    # no runtime scaling. Dense (--export_dequant) only; composes with gptq. false = original scheme.
    awq_scale:
      enabled: true
      alpha: 0.5             # exponent on E[x²]; larger = stronger amplification of salient channels
      max: 2.0              # clamp on S (S in [1, max])

    # --- Stage-2 flow (handled automatically by scripts/train.py) ---------------------
    # To avoid a dequant->permute->requant round-trip (double quantization), the permute/fold
    # is applied to a CLEAN fp16 base, which is saved to <output_dir>/permuted_fp16_base and
    # then reloaded through the standard load_in_4bit path so NF4 quantizes the permuted
    # weights exactly ONCE. That directory (~13GB) is kept so `--export_only` later can reload
    # the correct (permuted) base; delete it manually once you no longer need export-only.
    #
    # The per-segment residual permutation needs a runtime boundary gather (one index_select
    # per segment boundary; num_segments-1 total). It is re-registered for training in the
    # handler and for inference by the eval scripts (which read sqat_permute_meta.pt). Do not
    # evaluate a permuted export with a loader that ignores that metadata.

data:
  train_dataset: "metamath"
  train_split: "train"
  val_split: null
  prompt_template: "metamath"

training:
  output_dir: "outputs/qlora-sqat-permute"
  num_epochs: 1
  # Fix B: halve the micro-batch and double accumulation → same effective batch
  # (2 x 8 x 4 GPUs = 64) but ~half the peak activation memory, leaving headroom
  # for the longest sequences. group_by_length keeps padding waste low.
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  group_by_length: true
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_grad_norm: 0.3
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 1
  dataloader_num_workers: 4
  report_to: "wandb"
  seed: 42

export:
  merge_and_save: true
