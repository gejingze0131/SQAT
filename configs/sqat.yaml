model:
  name: "meta-llama/Llama-2-7b-hf"
  quant_bits: 4
  double_quant: true
  quant_type: "nf4"
  dtype: "bfloat16"
  max_seq_len: 2048

lora:
  rank: 64
  alpha: 16
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

qat:
  mode: "sqat"
  symmetric: true
  group_size: 64
  sqat:
    top_k_ratio: 0.01
    calibration_samples: 512
    calibration_seq_len: 2048

data:
  train_dataset: "commonsense"          # zwhe99/commonsense_170k (BoolQ, PIQA, SIQA, ARC-e/c, HellaSwag, WinoGrande, OBQA)
  train_split: "train"
  val_split: null                       # commonsense_170k ships only a train split
  prompt_template: "commonsense"

training:
  output_dir: "outputs/qlora"
  num_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_grad_norm: 0.3
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  dataloader_num_workers: 4
  report_to: "wandb"
  seed: 42

export:
  merge_and_save: true
